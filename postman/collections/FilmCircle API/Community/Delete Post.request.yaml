$kind: http-request
name: Delete Post
method: DELETE
url: '{{baseUrl}}/api/community/posts/{{postId}}'
order: 9000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK or 204 No Content", () => {
          pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
      pm.test("Post deleted successfully", () => {
          if (pm.response.code === 200) {
              const json = pm.response.json();
              pm.expect(json).to.have.property("message");
          }
      });
      pm.test("Clear postId after deletion", () => {
          pm.collectionVariables.set("postId", "");
      });
