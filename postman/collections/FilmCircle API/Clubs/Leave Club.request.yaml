$kind: http-request
name: Leave Club
method: DELETE
url: '{{baseUrl}}/api/clubs/{{clubId}}/leave'
order: 7000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Response confirms user left club", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("members");
          pm.expect(json.members).to.be.an("array");
      });
      pm.test("User ID is removed from members array", () => {
          const json = pm.response.json();
          const userId = pm.collectionVariables.get("userId");
          const isMember = json.members.some(m => m === userId || m._id === userId);
          pm.expect(isMember).to.be.false;
      });
