$kind: http-request
name: Login
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "testuser@example.com",
      "password": "Test@1234"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Response has token", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("token");
          pm.expect(json.token).to.be.a("string").and.not.empty;
          pm.collectionVariables.set("authToken", json.token);
      });
      pm.test("Response has user object with required fields", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("user");
          pm.expect(json.user).to.have.property("_id");
          pm.expect(json.user).to.have.property("email");
          pm.expect(json.user).to.have.property("username");
          pm.collectionVariables.set("userId", json.user._id);
      });
      pm.test("Response time is under 2000ms", () => pm.expect(pm.response.responseTime).to.be.below(2000));
