$kind: http-request
name: 'Register - Invalid Data (Negative)'
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "",
      "email": "not-an-email",
      "password": "123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 400 Bad Request for invalid data", () => pm.response.to.have.status(400));
      pm.test("Response contains validation error", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
      });
      pm.test("No token returned on invalid registration", () => {
          const json = pm.response.json();
          pm.expect(json).to.not.have.property("token");
      });
