$kind: http-request
name: 'Get Me - No Token (Negative)'
method: GET
url: '{{baseUrl}}/api/auth/me'
order: 7000
auth:
  type: noauth
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 401 Unauthorized without token", () => pm.response.to.have.status(401));
      pm.test("Response contains error message", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
      });
