$kind: http-request
name: 'Login - Wrong Password (Negative)'
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "testuser@example.com",
      "password": "WrongPassword!"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 401 Unauthorized for wrong password", () => pm.response.to.have.status(401));
      pm.test("Response contains error message", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
          pm.expect(json.message).to.be.a("string").and.not.empty;
      });
      pm.test("No token returned on failed login", () => {
          const json = pm.response.json();
          pm.expect(json).to.not.have.property("token");
      });
