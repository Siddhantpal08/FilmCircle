$kind: http-request
name: 'Upload Movie - Missing Title (Negative)'
method: POST
url: '{{baseUrl}}/api/movies/upload'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "description": "A film with no title",
      "genre": ["Drama"],
      "releaseYear": 2024
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 400 Bad Request for missing title", () => pm.response.to.have.status(400));
      pm.test("Response contains validation error", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
      });
      pm.test("No movie ID returned on failed upload", () => {
          const json = pm.response.json();
          pm.expect(json).to.not.have.property("_id");
      });
