$kind: http-request
name: 'Get Movie by ID (OMDb)'
method: GET
url: '{{baseUrl}}/api/movies/omdb/{{movieId}}'
order: 6000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", () => pm.response.to.have.status(200));
      pm.test("Response has movie details", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("title");
          pm.expect(json).to.have.property("year");
          pm.expect(json).to.have.property("genre");
          pm.expect(json).to.have.property("director");
          pm.expect(json).to.have.property("plot");
      });
      pm.test("Response has IMDb rating", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("imdbRating");
      });
