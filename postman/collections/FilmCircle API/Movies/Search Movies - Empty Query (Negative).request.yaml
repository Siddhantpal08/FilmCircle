$kind: http-request
name: 'Search Movies - Empty Query (Negative)'
method: GET
url: '{{baseUrl}}/api/movies/search'
order: 2000
queryParams:
  - key: q
    value: ''
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 400 Bad Request for empty query", () => pm.response.to.have.status(400));
      pm.test("Response contains error message", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("message");
      });
