<style>
    body {
      background-color: #0f0f0f;
      color: #e3e2e2;
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .cinema-gradient {
      background: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%);
    }
    .input-focus-ring:focus {
      outline: none;
      border-color: #c0392b;
      box-shadow: 0 0 0 1px #c0392b;

    ::-webkit-scrollbar {

    }
    * {
      -ms-overflow-style: none;
      scrollbar-width: none;

<body class="min-h-screen flex flex-col cinema-gradient">
<main class="flex-grow flex items-center justify-center px-gutter py-section-gap">
<div class="w-full max-w-[440px] bg-surface-container-low border border-outline-variant/30 rounded-xl p-8 md:p-12 transition-all duration-300 hover:border-outline-variant/60 shadow-2xl">
<div class="flex flex-col items-center mb-10 text-center">
<div class="mb-4">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">movie</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">FilmCircle</h1>
<p class="font-metadata text-metadata text-on-surface-variant">Your cinema, your circle.</p>
</div>
<form action="#" class="space-y-5" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="full-name">Full Name</label>
<input class="w-full bg-[#0A0A0A] border border-outline-variant/30 text-on-surface rounded-lg py-3 px-4 font-body-base text-body-base input-focus-ring transition-all placeholder:text-outline-variant" id="full-name" placeholder="John Doe" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="email">Email</label>
<input class="w-full bg-[#0A0A0A] border border-outline-variant/30 text-on-surface rounded-lg py-3 px-4 font-body-base text-body-base input-focus-ring transition-all placeholder:text-outline-variant" id="email" placeholder="john@example.com" type="email"/>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<input class="w-full bg-[#0A0A0A] border border-outline-variant/30 text-on-surface rounded-lg py-3 px-4 font-body-base text-body-base input-focus-ring transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-label-caps text-label-caps uppercase py-4 rounded-lg hover:brightness-110 active:scale-[0.98] transition-all tracking-widest shadow-lg shadow-primary-container/10 mt-2" type="submit">
          Create Account
        </button>
</form>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant/30"></span>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container-low px-4 text-on-surface-variant font-metadata text-metadata">or</span>
</div>
</div>
<div class="space-y-4">
<button class="w-full flex items-center justify-center gap-3 bg-transparent border border-outline-variant/50 text-on-surface font-label-caps text-label-caps uppercase py-4 rounded-lg hover:bg-surface-container-high active:scale-[0.98] transition-all tracking-widest">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="currentColor"></path>
</svg>
          Continue with Google
        </button>
</div>
<div class="mt-10 text-center">
<p class="font-metadata text-metadata text-on-surface-variant">
          Already have an account? 
          <a class="text-primary hover:underline underline-offset-4 ml-1 transition-all" href="#">Log In</a>
</p>
</div>
</div>
</main>
<footer class="w-full py-12 px-gutter flex flex-col md:flex-row justify-between items-center gap-4 border-t border-outline-variant/20 bg-surface-container-lowest">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">movie</span>
<span class="font-headline-sm text-headline-sm font-bold text-on-surface">FilmCircle</span>
</div>
<p class="font-metadata text-metadata text-on-surface-variant">© 2024 FilmCircle. The Criterion of Cinema.</p>
<div class="flex gap-6">
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors duration-200 uppercase" href="#">Legal</a>
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors duration-200 uppercase" href="#">Help</a>
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors duration-200 uppercase" href="#">Social Media</a>
</div>
</footer>
<script>
    // Micro-interaction: Input field focus effects
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.querySelector('label').classList.replace('text-on-surface-variant', 'text-primary');
      });
      input.addEventListener('blur', () => {
        input.parentElement.querySelector('label').classList.replace('text-primary', 'text-on-surface-variant');
      });
    });

    // Subtle parallax mouse effect for the background
    document.addEventListener('mousemove', (e) => {
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;
      document.body.style.background = `radial-gradient(circle at ${x * 100}% ${y * 100}%, #1a1a1a 0%, #0f0f0f 100%)`;
    });
  </script>
</body></html>
