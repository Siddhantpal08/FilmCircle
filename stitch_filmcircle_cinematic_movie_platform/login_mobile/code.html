<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-gutter">
<div class="grain-overlay"></div>
<!-- Background Atmospheric Elements -->
<div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-primary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[60%] h-[60%] bg-secondary-container/5 rounded-full blur-[150px]"></div>
</div>
<main class="w-full max-w-sm flex flex-col items-center space-y-10 relative z-10">
<!-- Branding Section -->
<header class="text-center space-y-3">
<h1 class="font-headline-md text-headline-md font-black tracking-tighter text-on-surface">FilmCircle</h1>
<p class="font-metadata text-metadata text-on-surface-variant uppercase tracking-[0.2em]">The Criterion of Cinema</p>
</header>
<!-- Login Form -->
<div class="w-full space-y-6">
<form class="space-y-4" id="loginForm">
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1" for="email">Email</label>
<input class="w-full h-14 px-4 bg-surface-container-lowest border border-outline-variant/30 text-on-surface rounded-lg focus:outline-none focus:border-primary-container transition-all duration-300 placeholder:text-muted-gray/40 font-body-base text-body-base" id="email" placeholder="cinephile@filmcircle.com" type="email"/>
</div>
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps text-on-surface-variant px-1" for="password">Password</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-lowest border border-outline-variant/30 text-on-surface rounded-lg focus:outline-none focus:border-primary-container transition-all duration-300 placeholder:text-muted-gray/40 font-body-base text-body-base" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<div class="flex justify-end pt-1">
<a class="font-metadata text-metadata text-primary-fixed-dim hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
</div>
<button class="w-full h-14 bg-primary-container text-on-primary-container font-label-caps text-label-caps flex items-center justify-center rounded-lg active:scale-95 transition-all duration-200 shadow-xl shadow-black/20" type="submit">
                    Log In
                </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="font-metadata text-metadata text-on-surface-variant">OR</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<!-- Social Auth -->
<button class="w-full h-14 border border-outline-variant/40 bg-transparent text-on-surface font-label-caps text-label-caps flex items-center justify-center gap-3 rounded-lg hover:bg-surface-container-low transition-colors active:scale-95" type="button">
<img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCTdrv1N2C_r4vvynpPp98pReSFAzOu4OSz7NkCWsmJw5CrlGd0witJIQawNb-CyGYz3kU69-1crWAurd-QrQX5tdynrh-SXxygoJZJOPUopy5rDfJWAbkI7_dYiFWGhJvnd67cEMjr5wNs7x87yynpVI39TSKLlYyWSHQ-l3uw2ezqKczvfJLEt4bRgi8yxkQ3A-rM8bhgNKDW74p2r12BXs0ZrEQNoY39kK7tG0DeCm95CsmBr2LwzgqsMUnqIxENnbme98vqhaQ"/>
                Continue with Google

<p class="font-body-base text-body-base text-on-surface-variant">
                New to the circle? 
                <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Sign Up</a>
</p>

<!-- Visual Flair: Film Strip Element (Fixed to side) -->
<div class="fixed right-4 top-1/2 -translate-y-1/2 hidden lg:flex flex-col gap-4 opacity-10">
<div class="w-16 h-24 bg-surface-variant border border-outline-variant/30 rounded-sm"></div>
<div class="w-16 h-24 bg-surface-variant border border-outline-variant/30 rounded-sm"></div>
<div class="w-16 h-24 bg-surface-variant border border-outline-variant/30 rounded-sm"></div>
</div>
<script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Micro-interaction simulation
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            btn.style.opacity = '0.8';
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.style.opacity = '1';
                // Simulation logic only
            }, 1500);
        });

        // Add visual reaction to input focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('.space-y-1.5').style.transform = 'translateY(-2px)';
                input.parentElement.closest('.space-y-1.5').style.transition = 'all 0.3s ease';
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('.space-y-1.5').style.transform = 'translateY(0)';
            });
        });
    </script>
