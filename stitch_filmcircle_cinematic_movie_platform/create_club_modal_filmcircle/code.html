<body class="bg-background text-on-surface min-h-screen overflow-hidden">
<!-- Background Content (Simulated for Context) -->
<header class="fixed top-0 z-10 flex justify-between items-center w-full px-margin-desktop py-4 max-w-container-max mx-auto bg-surface/80 backdrop-blur-md border-b border-outline-variant/30">
<div class="font-headline-sm text-headline-sm font-bold tracking-tighter text-on-surface">FilmCircle</div>
<nav class="hidden md:flex gap-8">
<a class="font-label-md text-label-md text-on-surface relative after:content-[''] after:absolute after:-bottom-2 after:left-1/2 after:-translate-x-1/2 after:w-1 after:h-1 after:bg-primary-container after:rounded-full" href="#">Community</a>

</nav>
<button class="font-label-md text-label-md bg-primary-container text-on-primary-container px-6 py-2 rounded-lg hover:opacity-80 transition-all active:scale-95">Sign Up</button>
</header>
<main class="pt-32 px-margin-desktop max-w-container-max mx-auto">
<div class="grid grid-cols-1 md:grid-cols-3 gap-gutter opacity-20 pointer-events-none">

</div>
<div class="aspect-[2/3] bg-surface-container rounded-lg overflow-hidden border border-outline-variant/20">
<img class="w-full h-full object-cover" data-alt="An artistic overhead shot of vintage film reels stacked neatly in a minimalist, modern dark room. The lighting is focused and dramatic, casting long shadows that emphasize the circular forms of the metal reels. High-contrast crimson accents highlight the edges of the film, creating a prestigious and exclusive feel. The overall style is clean and cinematic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDQhSTU3wee9DPIQxrBBS4zLzS2NQgcs8FP5FdbyPY3ImkyMJyUX_e0lVq-8eHH7jF8Isb7lmvi87gqsHHrRDdYH4S5xRk2Nm22zGNSscBhWtcEpy9p09woXkKkOfAvUbAx8ftQ-3HHE3MdthdU8ZgAt9WSSRBi3Q_x8rkABEAAkwxPqge8DsSTvwf4JUCKYZrtTYLO0HZ2owhl7OC5Ybj2E6I9OokwWWo5BTGc4E1aP1ChMXZuoCe9uR8JEG3DczE51_j_Pd24BTI"/>
</div>
<div class="aspect-[2/3] bg-surface-container rounded-lg overflow-hidden border border-outline-variant/20">
<img class="w-full h-full object-cover" data-alt="A wide, atmospheric shot of an empty, high-end private screening room featuring plush dark velvet seating and subtle crimson floor lighting. The screen displays a minimalist white logo against a pitch-black background, creating a stark high-contrast visual. The mood is one of quiet exclusivity and premium cinematic appreciation, with generous negative space defining the composition." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAhsuSexL-6ub7QLguq8aGTIim3IIfdgWSTdjzB1WPw6JnF9JqpDuppH4d211mixiEORxL_zRhZd0ajdZUgRMRVQU8CQmTS6E57-0nyh_24zW87iVVJPThIuLV6m7jiVhuqYqH6_WRwV4-dWBk03430APZB9KPW8pKi_Qxuppe89p2SLA0qOtCEzQqWYfkz1Ztg5PCVADoGDAlhClZRw5ShiNFfPNs9qkFq1hPgDxyInUf6Pi8CLD6Z4dSAbMnNmbR3BJjRX_aezPs"/>
</div>

</main>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-background/90 backdrop-blur-sm px-margin-mobile md:px-0" id="modal-overlay">
<!-- Modal Container -->
<section class="relative w-full max-w-[560px] bg-surface-container-low border border-outline-variant/30 rounded-xl overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-300">
<!-- Close Button -->
<button class="absolute top-6 right-6 text-secondary-fixed-dim hover:text-on-surface transition-colors" onclick="document.getElementById('modal-overlay').classList.add('hidden')">
<span class="material-symbols-outlined">close</span>
</button>
<!-- Modal Content -->
<div class="p-8 md:p-12">
<header class="mb-10">
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Create a Club</h1>
<p class="font-body-md text-body-md text-secondary-fixed-dim">Start a curated space for cinematic discussion and exclusive screenings.</p>
</header>
<form class="space-y-8" onsubmit="event.preventDefault();">
<!-- Input: Club Name -->
<div class="space-y-2 group">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="club-name">Club Name</label>
<input class="w-full bg-surface-container-highest border-b-2 border-outline-variant focus:border-primary-container outline-none py-3 text-on-surface font-body-md placeholder:text-secondary-fixed-dim/40 transition-all" id="club-name" placeholder="e.g. Neo-Noir Enthusiasts" type="text"/>
</div>
<!-- Input: Description -->
<div class="space-y-2 group">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest" for="description">Description</label>
<textarea class="w-full bg-surface-container-highest border-b-2 border-outline-variant focus:border-primary-container outline-none py-3 text-on-surface font-body-md placeholder:text-secondary-fixed-dim/40 transition-all resize-none" id="description" placeholder="Define the vision of your circle..." rows="3"></textarea>
</div>
<!-- Genre Multi-select -->
<div class="space-y-4">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Select Genres</label>
<div class="flex flex-wrap gap-2">
<button class="genre-pill px-4 py-2 rounded-full border border-outline-variant font-label-md text-label-md text-secondary-fixed-dim hover:border-on-surface transition-all active:scale-95" onclick="this.classList.toggle('bg-primary-container'); this.classList.toggle('text-on-primary-container'); this.classList.toggle('border-primary-container')" type="button">Noir</button>
<button class="genre-pill px-4 py-2 rounded-full border border-outline-variant font-label-md text-label-md text-secondary-fixed-dim hover:border-on-surface transition-all active:scale-95" onclick="this.classList.toggle('bg-primary-container'); this.classList.toggle('text-on-primary-container'); this.classList.toggle('border-primary-container')" type="button">Sci-Fi</button>
<button class="genre-pill px-4 py-2 rounded-full border border-outline-variant font-label-md text-label-md text-secondary-fixed-dim hover:border-on-surface transition-all active:scale-95" onclick="this.classList.toggle('bg-primary-container'); this.classList.toggle('text-on-primary-container'); this.classList.toggle('border-primary-container')" type="button">Avant-Garde</button>
<button class="genre-pill px-4 py-2 rounded-full border border-outline-variant font-label-md text-label-md text-secondary-fixed-dim hover:border-on-surface transition-all active:scale-95" onclick="this.classList.toggle('bg-primary-container'); this.classList.toggle('text-on-primary-container'); this.classList.toggle('border-primary-container')" type="button">Documentary</button>
<button class="genre-pill px-4 py-2 rounded-full border border-outline-variant font-label-md text-label-md text-secondary-fixed-dim hover:border-on-surface transition-all active:scale-95" onclick="this.classList.toggle('bg-primary-container'); this.classList.toggle('text-on-primary-container'); this.classList.toggle('border-primary-container')" type="button">Classic</button>
</div>
</div>
<!-- Privacy Toggle -->
<div class="flex items-center justify-between p-4 bg-surface-container-high rounded-lg border border-outline-variant/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container" id="privacy-icon">public</span>
<div>
<p class="font-label-md text-label-md text-on-surface" id="privacy-label">Public Club</p>
<p class="text-[12px] text-secondary-fixed-dim">Anyone can discover and join.</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" onchange="togglePrivacy(this)" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
<!-- Action Buttons -->
<div class="flex gap-4 pt-4">
<button class="flex-1 font-label-md text-label-md text-on-surface py-4 rounded-lg border border-outline-variant hover:bg-surface-container transition-colors active:scale-95" onclick="document.getElementById('modal-overlay').classList.add('hidden')" type="button">Cancel</button>
<button class="flex-1 font-label-md text-label-md bg-primary-container text-on-primary-container py-4 rounded-lg hover:opacity-90 transition-all active:scale-95 shadow-lg shadow-primary-container/20" type="submit">Create Club</button>
</div>
</form>
</div>
</section>
</div>
<!-- Footer (Minimal) -->
<footer class="fixed bottom-0 w-full flex flex-col md:flex-row justify-between items-center px-margin-desktop py-8 max-w-container-max mx-auto bg-surface-container-lowest">
<div class="font-label-md text-label-md text-secondary-fixed-dim mb-4 md:mb-0">© 2024 FilmCircle. The cinematic social network.</div>
<div class="flex gap-6">
<a class="font-label-md text-label-md text-secondary-fixed-dim hover:text-primary-container transition-colors" href="#">Privacy</a>
<a class="font-label-md text-label-md text-secondary-fixed-dim hover:text-primary-container transition-colors" href="#">Terms</a>
<a class="font-label-md text-label-md text-secondary-fixed-dim hover:text-primary-container transition-colors" href="#">Support</a>
</div>
</footer>
<script>
        function togglePrivacy(checkbox) {
            const label = document.getElementById('privacy-label');
            const icon = document.getElementById('privacy-icon');
            const desc = label.nextElementSibling;
            
            if(checkbox.checked) {
                label.textContent = 'Private Club';
                icon.textContent = 'lock';
                desc.textContent = 'Only invited members can access.';
            } else {
                label.textContent = 'Public Club';
                icon.textContent = 'public';
                desc.textContent = 'Anyone can discover and join.';
            }
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('modal-overlay').classList.add('hidden');
            }
        });
    </script>
