<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - FilmCircle</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar suppression as per style guidance */
        ::-webkit-scrollbar {
            display: none;
        }
        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .cinematic-gradient {
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0f0f0f 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#ffb4a9",
                        "on-primary-container": "#ffe5e1",
                        "inverse-primary": "#b02d21",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed": "#3c0704",
                        "on-primary-fixed": "#410000",
                        "surface-tint": "#ffb4a9",
                        "secondary": "#ffb4a9",
                        "secondary-container": "#79342b",
                        "surface-dim": "#121414",
                        "surface-container-high": "#292a2a",
                        "on-secondary-fixed-variant": "#763229",
                        "tertiary-container": "#007296",
                        "primary-fixed": "#ffdad5",
                        "surface-variant": "#343535",
                        "secondary-fixed-dim": "#ffb4a9",
                        "tertiary-fixed": "#c0e8ff",
                        "on-tertiary-container": "#d3eeff",
                        "on-secondary": "#591c15",
                        "on-surface-variant": "#e1bfb9",
                        "outline": "#a88a85",
                        "on-tertiary-fixed": "#001e2b",
                        "surface-bright": "#383939",
                        "primary-container": "#c0392b",
                        "error-container": "#93000a",
                        "on-tertiary": "#003548",
                        "inverse-surface": "#e3e2e2",
                        "surface-container": "#1f2020",
                        "surface": "#121414",
                        "secondary-fixed": "#ffdad5",
                        "on-primary": "#690001",
                        "inverse-on-surface": "#303031",
                        "error": "#ffb4ab",
                        "surface-container-low": "#1b1c1c",
                        "surface-container-lowest": "#0d0e0f",
                        "background": "#121414",
                        "on-error": "#690005",
                        "on-surface": "#e3e2e2",
                        "outline-variant": "#59413d",
                        "primary-fixed-dim": "#ffb4a9",
                        "on-primary-fixed-variant": "#8e130c",
                        "tertiary": "#80d0f8",
                        "on-tertiary-fixed-variant": "#004d66",
                        "on-background": "#e3e2e2",
                        "tertiary-fixed-dim": "#80d0f8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "80px",
                        "gutter": "24px",
                        "container-margin-desktop": "64px",
                        "base-unit": "8px",
                        "container-margin-mobile": "20px"
                    },
                    "fontFamily": {
                        "body-base": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "metadata": ["Inter"],
                        "display-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "body-base": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "metadata": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "display-lg-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface cinematic-gradient min-h-screen flex items-center justify-center p-gutter">
<!-- Subtle Atmospheric Background Effect -->
<div class="fixed inset-0 pointer-events-none opacity-20 overflow-hidden">
<div class="absolute inset-0 bg-repeat bg-center mix-blend-overlay" id="grain"></div>
</div>
<main class="w-full max-w-[440px] z-10">
<!-- Auth Shell -->
<div class="bg-surface-container border border-outline-variant/30 rounded-xl px-8 py-10 md:px-12 md:py-12 shadow-2xl transition-all duration-500">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-10">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center mb-4 shadow-[0_0_20px_rgba(192,57,43,0.4)]">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">movie</span>
</div>
<h1 class="font-headline-md text-headline-md font-black tracking-tight text-on-surface">FilmCircle</h1>
<p class="font-metadata text-metadata text-on-surface-variant mt-1">Your cinema, your circle.</p>
</div>
<!-- Login Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-[#0a0a0a] border border-outline-variant/50 rounded-lg px-4 py-3 text-on-surface font-body-base placeholder:text-outline/50 focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-all outline-none" id="email" name="email" placeholder="cinephile@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="password">Password</label>
<a class="font-metadata text-metadata text-outline hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-[#0a0a0a] border border-outline-variant/50 rounded-lg px-4 py-3 text-on-surface font-body-base placeholder:text-outline/50 focus:ring-1 focus:ring-primary-container focus:border-primary-container transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container hover:bg-inverse-primary text-white font-label-caps text-label-caps py-4 rounded-lg uppercase tracking-widest transition-all duration-300 transform active:scale-[0.98] shadow-lg shadow-primary-container/20" type="submit">
                    Log In
                </button>
</form>
<!-- Divider -->
<div class="relative my-8 flex items-center">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 font-label-caps text-label-caps text-on-surface-variant lowercase">or</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Provider -->
<button class="w-full flex items-center justify-center gap-3 bg-transparent border border-outline-variant/50 hover:bg-surface-variant/20 py-3.5 rounded-lg transition-all group">
<svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body-base text-body-base text-on-surface">Continue with Google</span>
</button>
<!-- Footer Link -->
<div class="mt-10 text-center">
<p class="font-metadata text-metadata text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
</main>
<!-- Visual Polish: Floating Movie Reel elements -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary-container via-transparent to-primary-container opacity-30"></div>
<script>
        // Atmospheric Micro-interactions
        const grainContainer = document.getElementById('grain');
        let grainMove = 0;

        function animateGrain() {
            grainMove = (grainMove + 1) % 10;
            grainContainer.style.transform = `translate(${Math.random() * 2}px, ${Math.random() * 2}px)`;
            requestAnimationFrame(animateGrain);
        }
        
        // Form field focus effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });

        animateGrain();
    </script>
</body></html>
