<body class="font-body-base text-body-base">
<!-- Background Cinematic Layer -->
<div class="fixed inset-0 -z-10">
<img class="w-full h-full object-cover opacity-30 grayscale" data-alt="A dramatic cinematic wide shot of an empty, vintage movie theater with deep crimson velvet seats and a faint, glowing projector light beam cutting through a dark, smoky atmosphere. The lighting is moody and high-contrast, emphasizing deep charcoal shadows and sharp highlights. The overall aesthetic is premium, exclusive, and mirrors the sophisticated FilmCircle brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDPnN2yGGzQ_r6sWGoSC2HW2DWixcA3ObIousBZbed6QMBK1gkYzmi2mxWWqyztitkBV4r6eqFREK5PV5L_PyI2AI9VrYZQDTHQ21mj91c1e_bavp_eQ56GYlLMWfok8X3FyDrTd50EqnTj4yCQBPPgdrQs3UgRkBBR_6yTnigXZCX7DlVWFcUd_BIar6Kzf80faPPkD5LR7ZNZetWV_icHnxOhLLiPRuuhHz7pCJlnBXgGvVeMUo0freips9lDYPOTd3jZZ-27Ihc"/>
<div class="absolute inset-0 cinematic-gradient"></div>
</div>
<!-- Main Content Container -->
<main class="min-h-screen flex flex-col px-container-margin-mobile pt-12 pb-8 max-w-md mx-auto relative z-10">
<!-- Header Section -->
<header class="mb-12 text-center">
<h1 class="font-headline-md text-headline-md font-black tracking-tight text-on-surface mb-2">FilmCircle</h1>
<p class="font-body-base text-body-base text-on-surface-variant">The Criterion of Cinema.</p>
</header>
<!-- Form Section -->
<section class="flex-grow">
<h2 class="font-display-lg-mobile text-display-lg-mobile mb-8 text-on-surface">Create your<br/>account</h2>
<form class="space-y-4" id="signupForm">
<!-- Full Name Field -->
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase ml-1" for="name">Full Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-4 py-4 text-on-surface placeholder:text-outline font-body-base input-focus-ring transition-all duration-200" id="name" placeholder="John Doe" type="text"/>
</div>
<!-- Email Field -->
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase ml-1" for="email">Email</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-4 py-4 text-on-surface placeholder:text-outline font-body-base input-focus-ring transition-all duration-200" id="email" placeholder="email@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 rounded-lg px-4 py-4 text-on-surface placeholder:text-outline font-body-base input-focus-ring transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-6 space-y-4">
<button class="w-full bg-primary-container text-on-primary-container font-label-caps text-label-caps py-5 rounded-lg active:scale-[0.98] transition-all duration-200 shadow-xl shadow-black/40" type="submit">
                        CREATE ACCOUNT
                    </button>
<div class="relative flex py-4 items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 font-label-caps text-[10px] text-outline uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<button class="w-full flex items-center justify-center gap-3 bg-transparent border border-outline/30 text-on-surface font-label-caps text-label-caps py-5 rounded-lg active:bg-surface-container-high transition-all duration-200" type="button">
<img alt="Google Logo" class="w-5 h-5 grayscale invert brightness-200" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCohsiLHv2jY5BunD65C_q9gv2l0aJsghAMYRquN4IPTlpn94ZGGz71ork88PTiKTMCu3dLOabI9N6KfHQ47ALoHnh2-vtRhezkvtZKW6kfUpBNNzBv9sHARZVbUuMbAh3QTetTxh0XNx_Eba_wo65VxgjobBY14gC0-UX9lfjwUxJuigJn_2FAoQRRdR2ts06JF_r6TQd5Hsj_Hi45rn94djtjiNwQA0bLOh6iAIoN2vfhkAilFPsOr4nQVbW1ujDJ6Oh3O7opEdA"/>
                        CONTINUE WITH GOOGLE
                    </button>
</div>
</form>
</section>
<!-- Footer Link Section -->
<footer class="mt-12 text-center">
<p class="font-metadata text-metadata text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold ml-1 hover:underline transition-all" href="#">Log In</a>
</p>
</footer>
</main>
<script>
        // Micro-interaction for form inputs
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.replace('text-on-surface-variant', 'text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.replace('text-primary', 'text-on-surface-variant');
            });
        });

        // Basic submission interaction
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = 'PREPARING THE REEL...';
            btn.classList.add('opacity-80');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('opacity-80');
            }, 1500);
        });
    </script>
</body></html>
